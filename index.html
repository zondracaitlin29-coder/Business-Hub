<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Zondra's Hub">
<meta name="theme-color" content="#f5f0eb">
<title>Zondra's Digital Business Hub</title>
<link rel="manifest" id="pwa-manifest">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #f5f0eb;
    --card: #fffcf9;
    --coral: #d4754a;
    --coral-lt: #e8a882;
    --coral-pale: #f7ece5;
    --sage: #7a9178;
    --sage-dk: #5c7060;
    --sage-pale: #eaf0e8;
    --ink: #2d2d2d;
    --muted: #8a8078;
    --border: #e4dbd2;
    --sh: 0 2px 12px rgba(90,70,50,.10);
    --sh2: 0 6px 24px rgba(90,70,50,.16);
    --r: 16px;
    --rs: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink);
    min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .app { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }

  /* HEADER */
  .hdr { display: flex; flex-direction: column; align-items: center; padding: 30px 0 20px; gap: 10px; }
  .logo-box { width: 90px; height: 90px; background: var(--card); border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--sh); padding: 4px; overflow: hidden; }
  .logo-box img { width: 100%; height: 100%; object-fit: contain; }
  .hdr-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700;
    letter-spacing: -.3px; }
  .hdr-sub { font-size: 11px; color: var(--muted); letter-spacing: .1em;
    text-transform: uppercase; font-weight: 600; }
  .divider { height: 1px; background: var(--border); margin: 0 0 18px; }
  .sec-label { font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .12em; color: var(--muted); margin-bottom: 10px; padding-left: 2px; }

  /* INSTALL BANNER */
  .install-banner { background: var(--coral-pale); border: 1.5px solid var(--coral-lt);
    border-radius: var(--rs); padding: 12px 14px; margin-bottom: 14px;
    display: none; align-items: center; gap: 10px; }
  .install-banner.show { display: flex; }
  .install-text { font-size: 12.5px; color: var(--coral); font-weight: 500;
    line-height: 1.4; flex: 1; }
  .install-btn { padding: 7px 14px; background: var(--coral); color: #fff; border: none;
    border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; white-space: nowrap; }
  .dismiss-x { background: none; border: none; cursor: pointer; color: var(--coral);
    font-size: 18px; line-height: 1; padding: 2px; }

  /* PRODUCT GRID */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 4px; }
  .card { background: var(--card); border-radius: var(--r); padding: 18px 14px 16px;
    cursor: pointer; border: 2px solid transparent; box-shadow: var(--sh);
    transition: all .18s ease; display: flex; flex-direction: column;
    align-items: flex-start; gap: 5px; user-select: none; }
  .card:active { transform: scale(.97); }
  .card.active { border-color: var(--coral); background: #fffaf7; box-shadow: var(--sh2); }
  .card-emoji { font-size: 24px; line-height: 1; margin-bottom: 2px; }
  .card-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .card-price { font-size: 13px; font-weight: 600; color: var(--sage-dk); }
  .card-add { background: var(--sage-pale); border: 2px dashed var(--sage);
    cursor: pointer; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 4px; min-height: 110px; }
  .card-add:active { transform: scale(.97); }

  /* DETAIL PANEL */
  .detail { background: var(--card); border-radius: var(--r); margin-top: 12px;
    box-shadow: var(--sh2); overflow: hidden;
    animation: sd .22s ease; }
  @keyframes sd { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:none } }

  .det-hdr { display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 0; }
  .det-title { display: flex; align-items: center; gap: 9px; }
  .det-emoji { font-size: 22px; }
  .det-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; }
  .det-price { font-size: 13px; font-weight: 600; color: var(--coral); margin-top: 1px; }
  .close-x { width: 28px; height: 28px; border-radius: 50%; background: var(--bg);
    border: none; cursor: pointer; font-size: 14px; color: var(--muted);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* TABS */
  .tabs { display: flex; margin: 14px 16px 0; background: var(--bg);
    border-radius: var(--rs); padding: 3px; gap: 3px; overflow-x: auto; }
  .tab-btn { flex: 0 0 auto; padding: 8px 12px; border: none; border-radius: 8px;
    background: transparent; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--muted); transition: all .15s; font-family: inherit; white-space: nowrap; }
  .tab-btn.active { background: var(--card); color: var(--ink); font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); }

  /* REPLY BOX */
  .reply-box { margin: 12px 16px 0; background: var(--bg); border-radius: var(--rs);
    padding: 13px; }
  .reply-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; }
  .reply-txt { font-size: 13.5px; line-height: 1.65; color: var(--ink);
    white-space: pre-wrap; word-break: break-word; }

  /* SETTINGS PANEL */
  .settings-panel { padding: 16px; }
  .settings-section { margin-bottom: 20px; }
  .settings-section:last-child { margin-bottom: 0; }
  .settings-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .1em; color: var(--coral); margin-bottom: 12px; }
  .product-type-badge { display: inline-block; padding: 4px 10px; background: var(--sage-pale);
    color: var(--sage-dk); border-radius: 12px; font-size: 11px; font-weight: 600;
    margin-bottom: 12px; }
  .input-group { margin-bottom: 10px; }
  .input-label { font-size: 11px; font-weight: 600; color: var(--muted);
    margin-bottom: 4px; display: block; }
  .input-field { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--card);
    color: var(--ink); outline: none; }
  .input-field:focus { border-color: var(--coral); }
  .textarea-field { resize: vertical; min-height: 80px; }
  .select-field { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--card);
    color: var(--ink); outline: none; }
  .select-field:focus { border-color: var(--coral); }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-sm { flex: 1; padding: 8px 10px; border: none; border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: background .15s; white-space: nowrap; }
  .btn-save { background: var(--sage); color: #fff; }
  .btn-save:active { background: var(--sage-dk); }
  .btn-del { background: var(--coral-pale); color: var(--coral); }
  .btn-del:active { background: var(--coral-lt); }
  .btn-back { background: var(--border); color: var(--muted); }
  .btn-back:active { background: #d4c4b4; }

  /* ACTION BUTTONS */
  .action-row { display: flex; gap: 8px; margin: 12px 16px 16px; flex-wrap: wrap; }
  .copy-btn { flex: 1; min-width: 140px; padding: 12px 0; background: var(--sage); color: #fff;
    border: none; border-radius: var(--rs); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: background .15s;
    display: flex; align-items: center; justify-content: center; gap: 6px; }
  .copy-btn:active { background: var(--sage-dk); }
  .extra-btn { padding: 12px 14px; background: var(--coral-pale); color: var(--coral);
    border: none; border-radius: var(--rs); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: background .15s;
    text-decoration: none; display: flex; align-items: center; gap: 5px;
    white-space: nowrap; }
  .extra-btn:active { background: #f0d4c4; }

  /* TOAST */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #2d2d2d; color: #fff; padding: 10px 22px; border-radius: 24px;
    font-size: 13px; font-weight: 500; z-index: 999; opacity: 0;
    transition: opacity .2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="logo-box">
      <img id="logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='url(%23grad)'/%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23d4754a;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%237a9178;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M96 48c-26.5 0-48 21.5-48 48s21.5 48 48 48 48-21.5 48-48-21.5-48-48-48zm0 80c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32zm16-32c0 8.8-7.2 16-16 16s-16-7.2-16-16 7.2-16 16-16 16 7.2 16 16z' fill='%23fff'/%3E%3Cpath d='M96 30c-36.3 0-66 29.7-66 66s29.7 66 66 66 66-29.7 66-66-29.7-66-66-66zm0 120c-29.8 0-54-24.2-54-54s24.2-54 54-54 54 24.2 54 54-24.2 54-54 54z' fill='%23fff' opacity='0.3'/%3E%3C/svg%3E" alt="Zondra's Digital Business Hub">
    </div>
    <h1 class="hdr-title">Zondra's Digital</h1>
    <p class="hdr-sub">Business Hub</p>
    <div class="divider"></div>
  </div>

  <div class="install-banner" id="install-banner">
    <span class="install-text">Install app for quick access 📱</span>
    <button class="install-btn" onclick="installApp()">Add to Home</button>
    <button class="dismiss-x" onclick="dismissInstall(); return false;">✕</button>
  </div>

  <!-- PRODUCT GRID -->
  <div class="sec-label" id="products-label">Products</div>
  <div class="grid" id="grid"></div>

  <!-- DETAIL PANEL -->
  <div id="panel"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── PRODUCTS STORAGE ──────────────────────────────────────────
function getProducts() {
  const products = JSON.parse(localStorage.getItem("ia_products") || "[]");
  if (products.length === 0) {
    const defaults = [
      { id: 1, name: "Content Audit", emoji: "📋", price: "Free", type: "free", replyTemplate: "Thank you for choosing Zondra's Digital Business Hub! 📋\n\nYour free Content Audit is ready to download. I've reviewed your inbox workflow and put together actionable insights.\n\nLet's get your inbox running smoothly! 🚀" },
      { id: 2, name: "CV Guide", emoji: "🎯", price: "R50", type: "guide", downloadLink: "https://selar.com/cv-guide", replyTemplate: "Thank you for purchasing the CV Guide! 🎯\n\nYou can access your download immediately right here:\n{link}" },
      { id: 3, name: "Baby Guide", emoji: "👶", price: "R80", type: "guide", downloadLink: "https://selar.com/baby-guide", replyTemplate: "Thank you for purchasing the Nurturing Little Eaters Guide! 👶🌿\n\nAccess your download here:\n{link}" },
      { id: 4, name: "Reply Vault", emoji: "📲", price: "R120", type: "app", tutorial: "Save to home screen for quick access", replyTemplate: "Thank you for purchasing The Reply Vault! 📲\n\nYour templates are ready. Access here: https://selar.co/reply-vault\n\nSave to home screen!" },
      { id: 5, name: "Inbox Management", emoji: "📥", price: "R450/week", type: "service", agreement: "", replyTemplate: "Thank you for choosing Zondra's Digital Business Hub! 📥\n\nI manage your inbox week-to-week with no long contracts.\n\nReady to jump in and give you your time back! 🚀" }
    ];
    localStorage.setItem("ia_products", JSON.stringify(defaults));
    return defaults;
  }
  return products;
}

function saveProducts(products) {
  localStorage.setItem("ia_products", JSON.stringify(products));
  render();
}

function getGlobalSettings() {
  return JSON.parse(localStorage.getItem("ia_global_settings") || '{"banking":{}}');
}

function saveGlobalSettings(settings) {
  localStorage.setItem("ia_global_settings", JSON.stringify(settings));
  render();
}

// ── STATE ──────────────────────────────────────────────────────
let sel = null;
let editingProductId = null;
let showingGlobalSettings = false;

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

function copy(txt) {
  navigator.clipboard.writeText(txt).then(() => toast("Copied! 📋"));
}

function pick(id) {
  sel = getProducts().find(p => p.id === id) || null;
  editingProductId = null;
  showingGlobalSettings = false;
  render();
}

function closePanel() {
  sel = null;
  editingProductId = null;
  showingGlobalSettings = false;
  render();
  return false;
}

function openProductSettings(id) {
  sel = null;
  editingProductId = id;
  showingGlobalSettings = false;
  render();
}

function openGlobalSettings() {
  sel = null;
  editingProductId = null;
  showingGlobalSettings = true;
  render();
}

function openAddProduct() {
  sel = {_isAddingProduct: true};
  editingProductId = null;
  showingGlobalSettings = false;
  render();
}

function render() {
  const products = getProducts();
  const gridEl = document.getElementById("grid");

  if (!sel && !editingProductId && !showingGlobalSettings) {
    // Grid view
    gridEl.innerHTML = products.map(p => `
      <div class="card" onclick="pick(${p.id})">
        <div class="card-emoji">${p.emoji}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price">${p.price}</div>
      </div>`).join("") + `
      <div class="card card-add" onclick="openAddProduct()">
        <div class="card-emoji">➕</div>
        <div class="card-name">Add Product</div>
      </div>`;
    
    document.getElementById("panel").innerHTML = `
      <button class="copy-btn" style="margin-top: 12px; background: var(--border); color: var(--muted);" onclick="openGlobalSettings()">⚙️ Global Settings</button>`;
    return;
  }

  gridEl.innerHTML = "";

  // ADDING PRODUCT
  if (sel && sel._isAddingProduct) {
    renderAddProductPanel();
    return;
  }

  // EDITING PRODUCT
  if (editingProductId) {
    renderEditProductPanel(editingProductId);
    return;
  }

  // GLOBAL SETTINGS
  if (showingGlobalSettings) {
    renderGlobalSettingsPanel();
    return;
  }

  // PRODUCT DETAIL
  if (sel) {
    renderProductDetail(sel);
  }
}

function renderProductDetail(p) {
  const pEl = document.getElementById("panel");
  let reply = p.replyTemplate || "";
  
  if (p.type === "guide" && p.downloadLink) {
    reply = reply.replace("{link}", p.downloadLink);
  }

  pEl.innerHTML = `
    <div class="detail">
      <div class="det-hdr">
        <div class="det-title">
          <div class="det-emoji">${p.emoji}</div>
          <div>
            <div class="det-name">${p.name}</div>
            <div class="det-price">${p.price}</div>
          </div>
        </div>
        <button class="close-x" type="button" onclick="closePanel(); return false;">✕</button>
      </div>
      <div class="reply-box">
        <div class="reply-lbl">Message</div>
        <div class="reply-txt">${reply}</div>
      </div>
      <div class="action-row">
        <button class="copy-btn" type="button" onclick="copy(\`${reply.replace(/`/g, "\\`")}\`); return false;">📋 Copy</button>
        ${p.type === "app" && p.tutorial ? `<button class="extra-btn" type="button" onclick="alert('Tutorial: ' + '${p.tutorial.replace(/'/g, "\\'")}')" >📖 Tutorial</button>` : ""}
        ${p.type === "service" && p.agreement ? `<button class="extra-btn" type="button" onclick="copy(\`${p.agreement.replace(/`/g, "\\`")}\`); return false;">📋 Agreement</button>` : ""}
      </div>
      <div style="display: flex; gap: 8px; margin: 8px 16px 16px; flex-wrap: wrap;">
        <button class="copy-btn" style="background: var(--border); color: var(--muted);" type="button" onclick="openProductSettings(${p.id}); return false;">⚙️ Edit</button>
        <button class="copy-btn" style="background: var(--coral-pale); color: var(--coral);" type="button" onclick="if(confirm('Delete ${p.name}? This can\\'t be undone.')) deleteProduct(${p.id}); return false;">🗑️ Delete</button>
      </div>
    </div>`;
}

function renderEditProductPanel(productId) {
  const products = getProducts();
  const p = products.find(pr => pr.id === productId);
  if (!p) return;

  const pEl = document.getElementById("panel");
  let typeSection = "";

  if (p.type === "guide") {
    typeSection = `
      <div class="input-group">
        <label class="input-label">Download Link</label>
        <input type="text" id="edit-link" class="input-field" value="${p.downloadLink || ''}" placeholder="https://selar.com/...">
      </div>`;
  } else if (p.type === "free") {
    typeSection = `
      <div class="input-group">
        <label class="input-label">Download Link</label>
        <input type="text" id="edit-link" class="input-field" value="${p.downloadLink || ''}" placeholder="https://...">
      </div>`;
  } else if (p.type === "app") {
    typeSection = `
      <div class="input-group">
        <label class="input-label">Tutorial / How-To</label>
        <textarea id="edit-tutorial" class="input-field textarea-field">${p.tutorial || ''}</textarea>
      </div>`;
  } else if (p.type === "service") {
    typeSection = `
      <div class="input-group">
        <label class="input-label">Service Agreement</label>
        <textarea id="edit-agreement" class="input-field textarea-field">${p.agreement || ''}</textarea>
      </div>`;
  }

  pEl.innerHTML = `
    <div class="detail">
      <div class="det-hdr">
        <div class="det-title">
          <div class="det-emoji">⚙️</div>
          <div class="det-name">Edit Product</div>
        </div>
        <button class="close-x" type="button" onclick="closePanel(); return false;">✕</button>
      </div>
      <div class="settings-panel">
        <div class="product-type-badge">${p.type.toUpperCase()}</div>
        
        <div class="settings-section">
          <div class="settings-section-title">Product Details</div>
          <div class="input-group">
            <label class="input-label">Name</label>
            <input type="text" id="edit-name" class="input-field" value="${p.name}">
          </div>
          <div class="input-group">
            <label class="input-label">Emoji</label>
            <input type="text" id="edit-emoji" class="input-field" value="${p.emoji}" maxlength="2">
          </div>
          <div class="input-group">
            <label class="input-label">Price</label>
            <input type="text" id="edit-price" class="input-field" value="${p.price}">
          </div>
          <div class="input-group">
            <label class="input-label">Message Template</label>
            <textarea id="edit-reply" class="input-field textarea-field">${p.replyTemplate || ''}</textarea>
          </div>
          ${typeSection}
        </div>
        
        <div class="btn-row">
          <button class="btn-sm btn-save" type="button" onclick="saveProductEdit(${productId}); return false;">Save Changes</button>
          <button class="btn-sm btn-back" type="button" onclick="closePanel(); return false;">Back</button>
        </div>
        <div class="btn-row">
          <button class="btn-sm btn-del" onclick="if(confirm('Delete this product? This can\\'t be undone.')) deleteProduct(${productId})">Delete Product</button>
        </div>
      </div>
    </div>`;
}

function renderAddProductPanel() {
  const pEl = document.getElementById("panel");

  pEl.innerHTML = `
    <div class="detail">
      <div class="det-hdr">
        <div class="det-title">
          <div class="det-emoji">➕</div>
          <div class="det-name">Add Product</div>
        </div>
        <button class="close-x" type="button" onclick="closePanel(); return false;">✕</button>
      </div>
      <div class="settings-panel">
        <div class="settings-section">
          <div class="settings-section-title">Product Type</div>
          <div class="input-group">
            <label class="input-label">Choose Type</label>
            <select id="add-type" class="select-field">
              <option value="guide">Guide (has download link)</option>
              <option value="app">App (has tutorial)</option>
              <option value="service">Service (has agreement)</option>
              <option value="other">Other</option>
              <option value="free">Free Resource (has link)</option>
            </select>
          </div>
          
          <div class="settings-section-title" style="margin-top: 16px;">Basic Info</div>
          <div class="input-group">
            <label class="input-label">Name</label>
            <input type="text" id="add-name" class="input-field" placeholder="e.g., My Guide">
          </div>
          <div class="input-group">
            <label class="input-label">Emoji</label>
            <input type="text" id="add-emoji" class="input-field" placeholder="e.g., 📖" maxlength="2" value="📖">
          </div>
          <div class="input-group">
            <label class="input-label">Price</label>
            <input type="text" id="add-price" class="input-field" placeholder="e.g., R100">
          </div>
          <div class="input-group">
            <label class="input-label">Message Template</label>
            <textarea id="add-reply" class="input-field textarea-field" placeholder="Thank you message..."></textarea>
          </div>
          <div id="add-type-fields"></div>
        </div>
        
        <div class="btn-row">
          <button class="btn-sm btn-save" type="button" onclick="createProduct(); return false;">Create Product</button>
          <button class="btn-sm btn-back" type="button" onclick="closePanel(); return false;">Cancel</button>
        </div>
      </div>
    </div>`;

  // Update type fields on change
  setTimeout(() => {
    const typeSelect = document.getElementById("add-type");
    if (typeSelect) {
      typeSelect.addEventListener("change", function() {
        updateAddTypeFields(this.value);
      });
    }
  }, 0);

  updateAddTypeFields("guide");
}

function updateAddTypeFields(type) {
  const fieldsEl = document.getElementById("add-type-fields");
  let html = "";

  if (type === "guide" || type === "free") {
    html = `
      <div class="input-group">
        <label class="input-label">Download/Purchase Link</label>
        <input type="text" id="add-link" class="input-field" placeholder="https://selar.com/...">
      </div>`;
  } else if (type === "app") {
    html = `
      <div class="input-group">
        <label class="input-label">Tutorial / How-To</label>
        <textarea id="add-tutorial" class="input-field textarea-field" placeholder="Quick instructions or link..."></textarea>
      </div>`;
  } else if (type === "service") {
    html = `
      <div class="input-group">
        <label class="input-label">Service Agreement</label>
        <textarea id="add-agreement" class="input-field textarea-field" placeholder="Agreement text..."></textarea>
      </div>`;
  }

  fieldsEl.innerHTML = html;
}

function createProduct() {
  const type = document.getElementById("add-type").value.trim();
  const name = document.getElementById("add-name").value.trim();
  const emoji = document.getElementById("add-emoji").value.trim() || "📦";
  const price = document.getElementById("add-price").value.trim();
  const reply = document.getElementById("add-reply").value.trim();

  if (!name || !price || !reply) {
    toast("Name, price, and message required");
    return;
  }

  const products = getProducts();
  const newId = Math.max(...products.map(p => p.id), 0) + 1;
  const newProduct = {
    id: newId,
    name, emoji, price, type,
    replyTemplate: reply
  };

  if (type === "guide" || type === "free") {
    const link = document.getElementById("add-link")?.value.trim() || "";
    newProduct.downloadLink = link;
  } else if (type === "app") {
    const tutorial = document.getElementById("add-tutorial")?.value.trim() || "";
    newProduct.tutorial = tutorial;
  } else if (type === "service") {
    const agreement = document.getElementById("add-agreement")?.value.trim() || "";
    newProduct.agreement = agreement;
  }

  products.push(newProduct);
  saveProducts(products);
  toast("Product created! 🎉");
  sel = null;
  editingProductId = null;
  showingGlobalSettings = false;
  render();
}

function saveProductEdit(productId) {
  const products = getProducts();
  const p = products.find(pr => pr.id === productId);
  if (!p) return;

  p.name = document.getElementById("edit-name").value.trim() || p.name;
  p.emoji = document.getElementById("edit-emoji").value.trim() || p.emoji;
  p.price = document.getElementById("edit-price").value.trim() || p.price;
  p.replyTemplate = document.getElementById("edit-reply").value.trim() || p.replyTemplate;

  if (p.type === "guide" || p.type === "free") {
    p.downloadLink = document.getElementById("edit-link")?.value.trim() || "";
  } else if (p.type === "app") {
    p.tutorial = document.getElementById("edit-tutorial")?.value.trim() || "";
  } else if (p.type === "service") {
    p.agreement = document.getElementById("edit-agreement")?.value.trim() || "";
  }

  saveProducts(products);
  toast("Product updated! 💾");
  pick(productId);
}

function deleteProduct(productId) {
  const products = getProducts().filter(p => p.id !== productId);
  saveProducts(products);
  toast("Product deleted");
  sel = null;
  editingProductId = null;
  showingGlobalSettings = false;
  render();
}

function saveBankingInfo() {
  const settings = getGlobalSettings();
  settings.banking = {
    holder: document.getElementById("bank-holder").value.trim(),
    account: document.getElementById("bank-account").value.trim(),
    branch: document.getElementById("bank-branch").value.trim(),
    bankName: document.getElementById("bank-name").value.trim()
  };
  saveGlobalSettings(settings);
  toast("Banking info saved! 💳");
}

// ── PWA INSTALL ────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").classList.add("show");
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      if (choice.outcome === "accepted") {
        toast("App installed! 🎉");
      }
      deferredPrompt = null;
      dismissInstall();
    });
  }
}

function dismissInstall() {
  document.getElementById("install-banner").classList.remove("show");
  return false;
}

// ── SERVICE WORKER ──────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  const swCode = `
const CACHE = "inbox-aide-v5";

self.addEventListener("install", e => {
  self.skipWaiting();
  e.waitUntil(caches.open(CACHE).then(c => c.add(self.location.href)));
});

self.addEventListener("activate", e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener("fetch", e => {
  if (e.request.url.includes("fonts.googleapis") || e.request.url.includes("fonts.gstatic")) {
    e.respondWith(
      caches.open(CACHE).then(c =>
        fetch(e.request).then(r => { c.put(e.request, r.clone()); return r; })
        .catch(() => c.match(e.request))
      )
    );
    return;
  }
  e.respondWith(
    caches.open(CACHE).then(c =>
      c.match(e.request).then(r => r || fetch(e.request).then(res => {
        c.put(e.request, res.clone()); return res;
      }).catch(() => c.match(self.location.href)))
    )
  );
});
  `;
  const swBlob = new Blob([swCode], {type: "application/javascript"});
  const swUrl = URL.createObjectURL(swBlob);
  if (location.protocol === "https:") {
    navigator.serviceWorker.register(swUrl, {scope: "."})
      .catch(e => console.warn("SW registration failed:", e));
  }
}
